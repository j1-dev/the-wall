<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Wall</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        padding: 20px;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
      }

      h1 {
        margin-bottom: 10px;
        color: #333;
      }

      .author-name {
        color: #666;
        font-size: 14px;
        margin-bottom: 20px;
      }

      .messages {
        background: white;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
        max-height: 400px;
        overflow-y: auto;
        border: 1px solid #ddd;
      }

      .message {
        padding: 12px;
        margin-bottom: 12px;
        background: #f9f9f9;
        border-left: 3px solid #007bff;
        border-radius: 4px;
      }

      .message:last-child {
        margin-bottom: 0;
      }

      .message-author {
        font-weight: 600;
        color: #007bff;
        font-size: 14px;
      }

      .message-text {
        margin: 6px 0;
        color: #333;
      }

      .message-time {
        font-size: 12px;
        color: #999;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        color: #333;
        font-weight: 500;
      }

      textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-family: inherit;
        font-size: 14px;
        resize: vertical;
        min-height: 80px;
      }

      button {
        background: #007bff;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
      }

      button:hover {
        background: #0056b3;
      }

      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }

      .status {
        font-size: 12px;
        color: #666;
        margin-top: 10px;
      }

      .status.connected {
        color: #28a745;
      }

      .status.disconnected {
        color: #dc3545;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>The Wall</h1>
      <div class="author-name">
        Author: <span id="authorName">Loading...</span>
      </div>

      <div class="messages" id="messages"></div>

      <form id="messageForm">
        <div class="form-group">
          <label for="messageText">Your message:</label>
          <textarea
            id="messageText"
            placeholder="Write something..."
            required
          ></textarea>
        </div>
        <button type="submit">Post Message</button>
      </form>

      <div class="status" id="status">Connecting...</div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
